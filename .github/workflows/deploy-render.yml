name: Deploy to Render

on:
  push:
    branches:
      - main

jobs:
  # Gate: run the hermetic security suite first. A broken main never deploys.
  security-tests:
    uses: ./.github/workflows/ci.yml

  deploy:
    needs: security-tests
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deploy via API
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://api.render.com/v1/services/srv-d6faks1drdic739rehmg/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache":"do_not_clear"}')
          HTTP_STATUS=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          echo "Status: $HTTP_STATUS"
          echo "Response: $BODY"
          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "Deploy trigger failed! (HTTP $HTTP_STATUS)"
            exit 1
          fi
          echo "Deploy triggered successfully!"
